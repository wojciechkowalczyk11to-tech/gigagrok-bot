steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/gigagrok:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gigagrok:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: [build]
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/gigagrok'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gigagrok
      - '--image=gcr.io/$PROJECT_ID/gigagrok:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8443'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--concurrency=80'
      - '--set-env-vars=WEBHOOK_URL=https://grok.nexus-oc.pl'

images:
  - 'gcr.io/$PROJECT_ID/gigagrok:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/gigagrok:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
